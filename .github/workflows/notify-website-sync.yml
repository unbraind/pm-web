name: Notify pm-cli website sync

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      ref:
        description: Optional ref to report (defaults to current SHA)
        required: false
        default: ''

jobs:
  notify-website-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    steps:
      - name: Resolve ref
        id: refs
        run: |
          echo "source_ref=${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref || github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Dispatch website sync workflow
        env:
          GH_REPO: unbraind/pm-cli-companion
          WEB_SOURCE_REPO: unbraind/pm-web
          WEBSITE_DISPATCH_TOKEN: ${{ secrets.PM_WEBSITE_DISPATCH_TOKEN || secrets.PM_SYNC_GITHUB_TOKEN || secrets.GH_PAT }}
        run: |
          set -euo pipefail

          if [[ -z "${WEBSITE_DISPATCH_TOKEN:-}" ]]; then
            echo "::error ::Set PM_WEBSITE_DISPATCH_TOKEN, PM_SYNC_GITHUB_TOKEN, or GH_PAT with access to dispatch workflows in $GH_REPO."
            exit 1
          fi

          # NOTE: only send pm_web_source_* keys. The companion's deploy.yml
          # treats `source_repo`/`source_ref` as aliases for `pm_cli_source_*`,
          # so sending pm-web's ref under those names points the docs fetcher
          # at the wrong repo. See pm-web-egz2 for the incident.
          payload=$(jq -cn \
            --arg pm_web_source_repo "$WEB_SOURCE_REPO" \
            --arg pm_web_source_ref "${{ steps.refs.outputs.source_ref }}" \
            '{ref:"main",inputs:{
              pm_web_source_repo:$pm_web_source_repo,
              pm_web_source_ref:$pm_web_source_ref
            }}')

          curl -sSf \
            -X POST \
            -H "Authorization: Bearer $WEBSITE_DISPATCH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$GH_REPO/actions/workflows/deploy.yml/dispatches" \
            -d "$payload"
