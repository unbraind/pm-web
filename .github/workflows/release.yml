name: Daily Release

on:
  schedule:
    - cron: "23 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-release
  cancel-in-progress: false

jobs:
  release:
    runs-on: self-hosted
    env:
      RELEASE_TIMEZONE: Europe/Vienna
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.2.0

      - name: Install dependencies
        run: npm ci

      - name: Decide release
        id: decide
        shell: bash
        run: |
          set -euo pipefail
          git fetch --force --tags
          latest_tag="$(git tag --sort=-creatordate | head -n 1 || true)"
          if [[ -n "$latest_tag" ]] && git diff --quiet "$latest_tag"..HEAD -- .; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "No changes since $latest_tag; skipping release." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          release_date="$(TZ="$RELEASE_TIMEZONE" date +%Y.%m.%d)"
          base_tag="v${release_date}"
          max_suffix=-1
          while IFS= read -r existing_tag; do
            if [[ "$existing_tag" == "$base_tag" ]]; then
              (( max_suffix < 0 )) && max_suffix=0
              continue
            fi
            if [[ "$existing_tag" == "$base_tag-"* ]]; then
              suffix="${existing_tag#"$base_tag-"}"
              if [[ "$suffix" =~ ^[0-9]+$ ]] && (( suffix > max_suffix )); then
                max_suffix="$suffix"
              fi
            fi
          done < <(git tag -l "${base_tag}*")
          if (( max_suffix >= 0 )); then
            tag="${base_tag}-$((max_suffix + 1))"
          else
            tag="$base_tag"
          fi

          version_core="${tag#v}"
          year="${version_core%%.*}"
          version_tail="${version_core#*.}"
          month="${version_tail%%.*}"
          day_and_suffix="${version_tail#*.}"
          day="${day_and_suffix%%-*}"
          suffix="${day_and_suffix#"$day"}"
          npm_version="$((10#$year)).$((10#$month)).$((10#$day))${suffix}"
          echo "should_release=true" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "npm_version=$npm_version" >> "$GITHUB_OUTPUT"

      - name: Update release version
        if: steps.decide.outputs.should_release == 'true'
        shell: bash
        run: |
          set -euo pipefail
          npm version "${{ steps.decide.outputs.npm_version }}" --no-git-tag-version --allow-same-version
          npm run build

      - name: Generate changelog and release notes
        if: steps.decide.outputs.should_release == 'true'
        shell: bash
        run: |
          set -euo pipefail
          npm run changelog:full
          npm run changelog:check
          npm run release:notes > RELEASE_NOTES.md

      - name: Run release checks
        if: steps.decide.outputs.should_release == 'true'
        run: npm run release:check

      - name: Validate bun installability
        if: steps.decide.outputs.should_release == 'true'
        shell: bash
        run: |
          set -euo pipefail
          rm -rf /tmp/pm-web-bun-check
          mkdir -p /tmp/pm-web-bun-check
          cd /tmp/pm-web-bun-check
          bun init -y > /dev/null
          bun add file:"$GITHUB_WORKSPACE"

      - name: Commit release files
        if: steps.decide.outputs.should_release == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json CHANGELOG.md dist public/src
          if ! git diff --cached --quiet; then
            git commit -m "Release pm-web ${{ steps.decide.outputs.tag }}"
          fi
          git tag "${{ steps.decide.outputs.tag }}"
          git push origin HEAD:main
          git push origin "${{ steps.decide.outputs.tag }}"

      - name: Create GitHub release
        if: steps.decide.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ steps.decide.outputs.tag }}" --title "pm-web ${{ steps.decide.outputs.tag }}" --notes-file RELEASE_NOTES.md --verify-tag
